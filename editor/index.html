<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vis Script Editor</title>
    <link rel="favicon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script type="text/javascript" src="https://unpkg.com/mathjs@15.2.0/lib/browser/math.js"></script>
    <script type="module" src="main.js"></script>
</head>
<body>
    <header class="toolbar">
        <div class="toolbar-group">
            <button class="btn" id="btn-load" title="Load Script (shift+o)">
                <span class="icon">📂</span>
            </button>
            <button class="btn" id="btn-save" title="Save Script (shift+s)">
                <span class="icon">💾</span>
            </button>
        </div>

        <div class="divider"></div>

        <div class="toolbar-group">
            <button class="btn" id="btn-export" title="Export Lua (shift+e)">
                <img src="assets/Lua-Icon.png" alt="Lua" class="icon" style="height: 1em; width: auto;"> Export
            </button>
        </div>

        <div class="divider"></div>

        <div class="toolbar-group">
            <button class="btn" id="btn-mirror" title="Toggle Mirror Mode">
                <span class="icon">🪞</span> Mirror
            </button>

            <button class="btn toggle-btn" id="btn-drag" title="Toggle Drag Mode">
                <span class="icon">🖐️</span> Drag
            </button>
            <button class="btn toggle-btn" id="btn-native" title="Toggle Native Mode">
                <span class="icon">⏱️</span> Native
            </button>
            <button class="btn toggle-btn active" id="btn-axes" title="Toggle Axes">
                <span class="icon">➕</span> Axes
            </button>
        </div>

        <div class="divider"></div>

        <div class="toolbar-group">
            <button class="btn" id="btn-import-timing" title="Import Timing CSV">
                <span class="icon">⏱️</span> Import Timing
            </button>
            <button class="btn" id="btn-time-seek-prev" title="Seek Previous Sequence">
                <span class="icon">⏪</span>
            </button>
            <button class="btn" id="btn-time-prev" disabled title="Previous Frame">
                <span class="icon">◀️</span>
            </button>
            <input type="text" class="time-spinner" id="input-time" value="0" min="0" title="Time (ms)">
            <button class="btn" id="btn-time-next" title="Next Frame">
                <span class="icon">▶️</span>
            </button>
            <button class="btn" id="btn-time-seek-next" title="Seek Next Sequence">
                <span class="icon">⏩</span>
            </button>

            <span class="frame-label" id="label-frame">Frame: 0</span>

            <select class="fps-select" id="select-fps" title="Frames Per Second">
                <option value="30">30 FPS</option>
                <option value="60">60 FPS</option>
            </select>
        </div>

        <div class="divider"></div>

        <div class="toolbar-group">
            <span class="toolbar-label">Canvas:</span>
            <input type="text" class="dim-input" id="input-canvas-w" value="800" title="Canvas Width">
            <span class="toolbar-label">x</span>
            <input type="text" class="dim-input" id="input-canvas-h" value="600" title="Canvas Height">
        </div>

        <div class="divider"></div>

        <div class="toolbar-group" style="margin-left: auto;">
            <button class="btn" id="btn-custom-script" title="Custom Scripting">
                <span class="icon">📝</span>
            </button>
        </div>
    </header>

    <div class="editor-body">
        <aside class="toolbar-left">
            <button class="btn" title="Add Emit Layer" id="btn-add-layer">
                <span class="icon">➕</span>
            </button>
            <button class="btn" title="Copy Frame" id="btn-copy-frame">
                <span class="icon">📑</span>
            </button>
            <button class="btn" title="Paste Frame" id="btn-paste-frame">
                <span class="icon">📋</span>
            </button>
            <button class="btn" title="Delete Frame" id="btn-delete-frame">
                <span class="icon">🗑️</span>
            </button>

            <div class="divider-horizontal"></div>

            <button class="btn tool-btn active" title="Square Tool" id="tool-square">
                <span class="icon">🟥</span>
            </button>
            <button class="btn tool-btn" title="Circle Tool" id="tool-circle">
                <span class="icon">⭕</span>
            </button>

            <div class="divider-horizontal"></div>

            <button class="btn" title="Undo" id="btn-undo">
                <span class="icon">↩️</span>
            </button>
            <button class="btn" title="Redo" id="btn-redo">
                <span class="icon">↪️</span>
            </button>

            <div class="divider-horizontal"></div>

            <button class="btn" title="Auto-Populate Particle Lifetime" id="btn-auto-lifetime">
                <span class="icon">⏳</span>
            </button>
            <button class="btn" title="Auto-Populate Particle Tags" id="btn-auto-tag">
                <span class="icon">🏷️</span>
            </button>
        </aside>

        <main class="editor-workspace" id="workspace">
            <canvas id="editor-canvas" tabindex="0"></canvas>
        </main>

        <aside class="layer-panel" id="layer-panel">
            <div class="layer-panel-header">
                <input type="text" id="input-frame-name" class="frame-name-input" title="Frame Name" placeholder="Frame Name">
                <input type="text" id="input-frame-offset" class="frame-name-input" title="Offset (ms)" placeholder="Offset (ms)" style="margin-top: 8px;">
                <input type="range" id="input-preview-age" class="frame-name-input" title="Preview Age" min="0" max="1" step="0.01" value="0" style="margin-top: 8px;">
            </div>
            <div class="layer-list" id="layer-list"></div>
        </aside>
    </div>

    <div class="timeline-wrapper">
        <div class="timeline-container" id="timeline-container"></div>
        <div class="timeline-controls">
            <span class="toolbar-label">Tempo:</span>
            <input type="number" class="dim-input" id="input-tempo" value="60" min="1" title="Tempo (BPM)">
            <span class="toolbar-label">Format:</span>
            <select class="fps-select" id="select-time-format" title="Time Format">
                <option value="ms">Milliseconds</option>
                <option value="beat">Beats</option>
                <option value="frame">Frame Index</option>
            </select>
        </div>
    </div>

    <footer class="status-bar">
        <div class="status-item">
            Cursor: <span id="status-cursor">- , -</span>
        </div>
    </footer>

    <div id="theta-modal" class="theta-modal">
        <div class="modal-content" style="width: 550px; max-width: 90vw;">
            <h4 id="theta-modal-title" style="margin-top: 0; margin-bottom: 10px; color: white; text-align: center;">Edit Angle & Spread</h4>
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px;">
                <div style="display: flex; flex-direction: column; flex: 1; min-width: 0;">
                    <h5 style="margin: 0 0 5px 0; color: white; text-align: center;">Theta</h5>
                    <input type="range" id="theta-slider" min="0" max="6.28318" step="0.01" style="width: 100%; box-sizing: border-box;">
                    <label style="font-size: 12px; margin-top: 8px;">Radians</label>
                    <input type="text" id="theta-radians" step="0.01"
                        title="Enter an expression in radians or a math.js expression (eg '2pi')"
                        style="width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 4px; border-radius: 4px;">
                    <label style="font-size: 12px; margin-top: 4px;">Degrees</label>
                    <input type="text" id="theta-degrees" step="1"
                        title="Enter an expression in degrees or a math.js expression (eg '180')"
                        style="width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 4px; border-radius: 4px;">
                </div>
                
                <div style="flex: 0 0 auto; display: flex; align-items: center;">
                    <canvas id="theta-canvas" width="150" height="150"></canvas>
                </div>

                <div style="display: flex; flex-direction: column; flex: 1; min-width: 0;">
                    <h5 style="margin: 0 0 5px 0; color: white; text-align: center;">Theta Variance</h5>
                    <input type="range" id="utheta-slider" min="0" max="3.14159" step="0.01" style="width: 100%; box-sizing: border-box;">
                    <label style="font-size: 12px; margin-top: 8px;">Radians</label>
                    <input type="text" id="utheta-radians" step="0.01"
                        title="Enter an expression in radians or a math.js expression (eg 'pi')"
                        style="width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 4px; border-radius: 4px;">
                    <label style="font-size: 12px; margin-top: 4px;">Degrees</label>
                    <input type="text" id="utheta-degrees" step="1"
                        title="Enter an expression in degrees or a math.js expression (eg '90')"
                        style="width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 4px; border-radius: 4px;">
                </div>
            </div>
            <div style="margin-top: 15px; text-align: center; font-size: 11px; color: rgba(255, 255, 255, 0.6);">
                Inputs support mathematical expressions like <code style="background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 3px;">2pi</code> or <code style="background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 3px;">pi/2</code>.
            </div>
        </div>
    </div>

    <div id="script-modal" class="theta-modal">
        <div class="modal-content" style="width: 600px; max-width: 90vw;">
            <h3 style="margin-top: 0; margin-bottom: 10px; color: white;">Custom Scripting</h3>
            <textarea id="script-textarea" style="width: 100%; height: 300px; font-family: monospace; background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px; box-sizing: border-box; resize: vertical;"></textarea>
        </div>
    </div>
</body>
</html>
